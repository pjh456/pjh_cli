name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux GCC 14
            os: ubuntu-24.04
            cmake_args: -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
            install: |
              sudo apt-get update
              sudo apt-get install -y g++-14

          - name: Linux Clang 19
            os: ubuntu-24.04
            cmake_args: -DCMAKE_C_COMPILER=clang-19 -DCMAKE_CXX_COMPILER=clang++-19
            install: |
              sudo apt-get update && sudo apt-get install -y wget gpg
              wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
              sudo add-apt-repository -y "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main"
              sudo apt-get update && sudo apt-get install -y clang-19

          - name: Windows MSVC
            os: windows-2022
            cmake_args: -G "Visual Studio 17 2022" -A x64

          - name: Windows ClangCL
            os: windows-2022
            cmake_args: -G "Visual Studio 17 2022" -A x64 -T ClangCL

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        if: matrix.install
        run: ${{ matrix.install }}

      - name: Configure
        run: cmake -B build ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
